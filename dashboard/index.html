<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · vanilla-router</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="navbar" id="nav-slot">
      <a class="brand" href="/"><span class="brand-mark">◆</span> vanilla-router</a>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/about/" class="nav-link">About</a>
        <a href="/users/" class="nav-link">User</a>
        <a href="/dashboard/" class="nav-link">Dashboard</a>
      </div>
      <div class="nav-actions">
        <button class="btn btn-ghost" data-auth-btn></button>
        <button class="btn btn-ghost" data-theme-btn aria-label="Toggle theme"></button>
      </div>
    </nav>

    <main id="view">
      <section class="page">
        <span class="eyebrow">Protected route</span>
        <h1 data-greeting>Welcome back</h1>
        <p class="lead">This page checks auth in its own <code>main.js</code> — the router has no idea what "protected" means. Log out via the nav, then reload this URL directly.</p>
        <div class="card" data-gate><p>Nothing to see here yet — just a gated page.</p></div>
      </section>
    </main>
  </div>

  <script src="/assets/router.js"></script>
  <script type="module" src="/assets/nav.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
